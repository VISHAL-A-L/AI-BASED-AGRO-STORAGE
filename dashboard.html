<!DOCTYPE html>
<html>

<head>

<title>AI Onion Storage Monitoring</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
}

h1{
color:#38bdf8;
margin-top:20px;
}

.cards{
display:flex;
justify-content:space-around;
flex-wrap:wrap;
margin:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
width:20%;
margin:10px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.card h2{
color:#22c55e;
}

.ai-panel{
display:flex;
justify-content:space-around;
flex-wrap:wrap;
margin-top:20px;
}

.ai-card{
background:#1e293b;
padding:20px;
border-radius:12px;
width:25%;
margin:10px;
}

canvas{
background:white;
border-radius:10px;
margin-top:20px;
}

button{
padding:10px 20px;
font-size:16px;
margin-top:20px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
}

.alert{
background:red;
padding:15px;
margin:20px;
font-size:22px;
display:none;
}

</style>

</head>

<body>

<h1>AI Onion Storage Monitoring System</h1>

<div id="alertBox" class="alert">
⚠ Onion Spoilage Risk Detected
</div>

<div class="cards">

<div class="card">
Temperature
<h2 id="temp">0 °C</h2>
</div>

<div class="card">
Humidity
<h2 id="hum">0 %</h2>
</div>

<div class="card">
Gas
<h2 id="gas">0</h2>
</div>

<div class="card">
Motion
<h2 id="motion">No</h2>
</div>

</div>

<canvas id="chart" height="120"></canvas>

<h2>AI Model Analysis</h2>

<div class="ai-panel">

<div class="ai-card">
Random Forest
<h3 id="rf">Waiting...</h3>
</div>

<div class="ai-card">
Isolation Forest
<h3 id="iso">Waiting...</h3>
</div>

<div class="ai-card">
LSTM Prediction
<h3 id="lstm">Waiting...</h3>
</div>

</div>

<button onclick="downloadExcel()">Download Excel</button>

<script>

let labels=[]
let tempData=[]
let humData=[]
let gasData=[]

const ctx=document.getElementById("chart")

let chart=new Chart(ctx,{

type:'line',

data:{
labels:labels,
datasets:[

{
label:"Temperature",
data:tempData,
borderColor:"red",
fill:false
},

{
label:"Humidity",
data:humData,
borderColor:"blue",
fill:false
},

{
label:"Gas",
data:gasData,
borderColor:"green",
fill:false
}

]
},

options:{
responsive:true
}

})

function getData(){

fetch("/getdata")

.then(res=>res.json())

.then(data=>{

let t=data.temperature
let h=data.humidity
let g=data.gas

document.getElementById("temp").innerHTML=t+" °C"
document.getElementById("hum").innerHTML=h+" %"
document.getElementById("gas").innerHTML=g
document.getElementById("motion").innerHTML=data.motion==1?"Detected":"No"

document.getElementById("rf").innerHTML=data.rf_prediction
document.getElementById("iso").innerHTML=data.iso_prediction
document.getElementById("lstm").innerHTML=data.lstm_prediction

let time=new Date().toLocaleTimeString()

labels.push(time)

tempData.push(t)
humData.push(h)
gasData.push(g)

if(labels.length>20){

labels.shift()
tempData.shift()
humData.shift()
gasData.shift()

}

chart.update()

if(
data.rf_prediction=="Spoilage Risk" ||
data.iso_prediction=="Anomaly Detected" ||
data.lstm_prediction=="Future Spoilage Risk"
){

document.getElementById("alertBox").style.display="block"

}else{

document.getElementById("alertBox").style.display="none"

}

})

}

setInterval(getData,3000)

function downloadExcel(){

window.location="/download"

}

</script>

</body>

</html>
